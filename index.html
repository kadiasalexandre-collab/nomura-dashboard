<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saldo Teórico — Dashboard Adidas Nomura</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e2035;--surface:#162d4a;--surface2:#1c3858;--border:#1e4d72;
  --blue:#5b9cf6;--green:#22d3a0;--red:#f87171;--orange:#fb923c;--amber:#fbbf24;--purple:#c084fc;
  --text:#e8f2fc;--muted:#7aaac8;--dim:#b0cce0;
  --font:-apple-system,'Helvetica Neue',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;overflow:hidden}
.app{display:grid;grid-template-rows:auto auto 1fr;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:28px;height:28px;background:var(--blue);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.5px}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.tag{padding:3px 8px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.tag-live{background:#10b9811a;color:var(--green);border:1px solid #10b98133}
.tag-date{background:var(--surface2);color:var(--dim);font-size:11px;padding:3px 10px;border-radius:3px}
.kpi-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.kpi-bar-rs{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:2px solid var(--border)}
.kpi{background:var(--surface);padding:10px 16px}
.kpi.meta-geral{background:#1e1b4b18;border-top:2px solid #6366f1}
.kpi.meta-fam{background:#052e1618;border-top:2px solid #10b981}
.cards-view{background:#eff6ff!important}
.state-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.state-bar-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-right:4px}
.state-btn{padding:3px 10px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--dim);font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.4px}
.state-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.kpi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.kpi-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:9.5px;color:var(--dim);margin-top:3px}
.kpi-g{color:var(--green)}.kpi-r{color:var(--red)}.kpi-a{color:var(--amber)}.kpi-b{color:var(--blue)}
.main{display:grid;grid-template-columns:300px 1fr 220px;height:100%;overflow:hidden}
.ranking-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.panel-hdr-top{display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
.fam-search{width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-family:var(--font);outline:none;box-sizing:border-box}
.fam-search:focus{border-color:var(--accent)}
.sort-btns{display:flex;gap:4px}
.sort-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:9px;padding:2px 6px;border-radius:2px;cursor:pointer;font-family:var(--font);letter-spacing:.3px}
.sort-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.ranking-list{overflow-y:auto;flex:1;padding:6px 0}
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-bottom:1px solid #0f1d3040;transition:background .1s}
.rank-item:hover{background:var(--surface2)}
.rank-item.active{background:#1e3354}
.rank-num{font-size:9px;color:var(--muted);width:16px;text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.rank-meta{font-size:9px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.rank-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.rank-woh{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bar-track{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.bar-fill{height:100%;border-radius:2px}
.detail-panel{overflow-y:auto;padding:16px 20px;background:var(--bg)}
.detail-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.detail-name{font-size:22px;font-weight:800;letter-spacing:-.3px;line-height:1}
.detail-cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
.status-badge{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-ok{background:#10b9811a;color:var(--green);border:1px solid #10b98133}
.badge-ruptura{background:#ef44441a;color:var(--red);border:1px solid #ef444433}
.badge-excesso{background:#f974161a;color:var(--orange);border:1px solid #f9741633}
.badge-estrela{background:#a855f71a;color:var(--purple);border:1px solid #a855f733}
.badge-semgiro{background:#64748b1a;color:var(--muted);border:1px solid #64748b33}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.metric-card.accent{border-color:var(--blue);background:#3b82f60a}
.metric-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.metric-sub{font-size:9px;color:var(--dim);margin-top:2px}
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:12px}
.chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-legend{display:flex;gap:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:2px}
.proj-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.proj-month{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.proj-main{display:flex;align-items:baseline;gap:6px}
.proj-val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
.proj-unit{font-size:10px;color:var(--muted)}
.proj-bar-track{height:6px;background:var(--border);border-radius:3px;margin-top:8px}
.proj-bar-fill{height:100%;border-radius:3px}
.proj-sub{font-size:9px;color:var(--dim);margin-top:5px}
.woh-section{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:12px}
.woh-canvas{flex-shrink:0}
.woh-info{flex:1}
.woh-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:4px}
.woh-val-big{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.woh-sub{font-size:10px;color:var(--dim);margin-top:3px}
.woh-scale{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:10px}
.woh-seg{flex:1;height:100%}
.alerts-panel{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto}
.alert-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.alert-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.alert-item{padding:6px 8px;border-radius:4px;margin-bottom:4px;cursor:pointer;transition:background .1s}
.alert-item:hover{background:var(--surface2)}
.alert-fam{font-size:10px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-detail{font-size:9px;color:var(--muted);font-variant-numeric:tabular-nums}
.alert-r{background:#ef44440c;border-left:2px solid var(--red)}
.alert-g{background:#10b9810c;border-left:2px solid var(--green)}
.alert-o{background:#f974160c;border-left:2px solid var(--orange)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80%;color:var(--muted);gap:8px}
/* filters */
.filt-btns{display:flex;gap:4px;margin-left:8px}
.filt-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:9px;padding:2px 7px;border-radius:10px;cursor:pointer;font-family:var(--font)}
.filt-btn.active{background:#a855f7;border-color:#a855f7;color:#fff}
.filt-btn.act-feds{background:#a855f7;border-color:#a855f7;color:#fff}
.filt-btn.act-other{background:var(--blue);border-color:var(--blue);color:#fff}
/* division filter */
.div-btns{display:flex;gap:4px;margin-left:8px}
.div-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:9px;padding:2px 7px;border-radius:10px;cursor:pointer;font-family:var(--font)}
.div-btn.act-div-all{background:var(--dim);border-color:var(--dim);color:#fff}
.div-btn.act-div-ftw{background:#3b82f6;border-color:#3b82f6;color:#fff}
.div-btn.act-div-app{background:#10b981;border-color:#10b981;color:#fff}
/* Agendamento button */
.agend-btn{background:#10b9811a;border:1px solid #10b98133;color:var(--green);font-size:10px;font-weight:600;padding:4px 12px;border-radius:4px;cursor:pointer;font-family:var(--font);letter-spacing:.3px}
.agend-btn:hover{background:#10b98133}
/* Overlay */
.overlay{position:fixed;inset:0;background:#000000cc;z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.overlay-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:min(860px,95vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.overlay-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.overlay-title{font-size:14px;font-weight:700;letter-spacing:.3px}
.overlay-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
.overlay-body{overflow-y:auto;padding:16px 18px}
.agend-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.agend-kpi{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px 12px}
.agend-table{width:100%;border-collapse:collapse;font-size:11px}
.agend-table th{background:var(--surface2);padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.agend-table td{padding:7px 10px;border-bottom:1px solid #1e335430;font-variant-numeric:tabular-nums}
.agend-table tr:hover td{background:var(--surface2)}
.week-chip{display:inline-block;background:var(--border);border-radius:3px;padding:1px 5px;font-size:9px;margin:1px;white-space:nowrap}
.st-chip{display:inline-block;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:600}
/* FEDS section */
.feds-section{margin-top:10px;padding:10px 12px;border-top:2px solid #a855f733;background:#a855f708}
.feds-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#a855f7;margin-bottom:8px}
/* projecao view */
.proj-view{display:none;overflow-y:auto;padding:16px 20px;flex:1}
.proj-view.active{display:block}
.proj-table{width:100%;border-collapse:collapse;font-size:11px}
.proj-table th{padding:8px 12px;font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border)}
.proj-table th.th-fam{text-align:left}
.proj-table th.th-mes{text-align:center;min-width:100px}
.proj-table td{padding:7px 12px;border-bottom:1px solid var(--border)20;vertical-align:middle}
.proj-table tr:hover td{background:var(--surface2)}
.proj-cell{display:flex;flex-direction:column;align-items:center;gap:1px}
.proj-cell-val{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums}
.proj-cell-lbl{font-size:7.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.proj-ok{background:#052e1612;color:#22d3a0}
.proj-risco{background:#7f3f0020;color:#fb923c}
.proj-rupt{background:#c0000025;color:#f87171}
.proj-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.proj-badge-ok{background:#052e1630;color:#22d3a0}
.proj-badge-risco{background:#7f3f0030;color:#fb923c}
.proj-badge-rupt{background:#c0000035;color:#f87171}
.proj-legend{display:flex;gap:12px;align-items:center;margin-bottom:12px;font-size:9px;color:var(--muted)}
.proj-legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.proj-export-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.proj-export-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
/* cards view */
.cards-view{display:none;overflow-y:auto;padding:16px 20px;flex:1}
.cards-view.active{display:block}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.cards-section-hdr{grid-column:1/-1;padding:6px 4px 2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);margin-bottom:2px}
.fam-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer}
.fam-card:hover{border-color:var(--blue)}
.fam-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border)}
.fam-card-name{font-size:10px;font-weight:800;letter-spacing:.2px;text-transform:uppercase}
.fam-card-woh{font-size:11px;font-weight:700}
.fam-card-body{padding:0}
.fam-row{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;border-bottom:1px solid var(--border)20}
.fam-row-lbl{font-size:9.5px;color:var(--muted)}
.fam-row-val{font-size:10px;font-weight:600;font-variant-numeric:tabular-nums}
.card-badge-x{color:#ef4444;font-size:15px;font-weight:900;line-height:1;flex-shrink:0}
.card-badge-ok{color:#22c55e;font-size:15px;font-weight:900;line-height:1;flex-shrink:0}
.page-break{display:none}
.cards-export-bar{display:none;align-items:center;gap:10px;padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.cards-export-bar.visible{display:flex}
.print-btn{padding:5px 14px;border:none;border-radius:4px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.print-btn:hover{background:#1d4ed8}
.fam-row-sep{border-top:1px solid var(--border);margin:2px 0}
.fam-row-saldo{background:var(--surface2)}
/* tab buttons */
.view-tabs{display:flex;gap:3px;margin-left:16px}
.view-tab{background:none;border:1px solid var(--border);color:var(--muted);font-size:9px;padding:3px 10px;border-radius:3px;cursor:pointer;font-family:var(--font)}
.view-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* resumo overlay */
.resumo-overlay{position:fixed;inset:0;background:#00000090;z-index:3000;display:none;align-items:center;justify-content:center}
.resumo-overlay.open{display:flex}
.resumo-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:min(920px,96vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px #00000060}
.resumo-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.resumo-title{font-size:22px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.resumo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.resumo-body{overflow-y:auto;padding:22px}
.resumo-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.resumo-kpi{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.resumo-kpi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.resumo-kpi-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.resumo-kpi-sub{font-size:10px;color:var(--dim);margin-top:4px}
.resumo-sec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.resumo-btn{background:var(--blue)20;border:1px solid var(--blue)40;color:var(--blue);font-size:9px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:var(--font)}
.resumo-btn:hover{background:var(--blue)35}
.close-resumo-btn{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:5px;cursor:pointer;font-family:var(--font);font-size:14px}
@media print{
  @page{size:A4 landscape;margin:1.2cm}
  body{background:#fff!important;padding:0!important;margin:0!important;overflow:visible!important}
  .hdr,.kpi-bar,.kpi-bar-rs,.state-bar,.view-tabs,.main,.overlay,.resumo-overlay,.cards-export-bar{display:none!important}
  .app{display:block!important;height:auto!important}
  .cards-view{display:block!important;padding:0!important;background:#fff!important;overflow:visible!important}
  .cards-grid{display:grid!important;grid-template-columns:repeat(5,1fr)!important;gap:5px!important}
  .fam-card{break-inside:avoid;box-shadow:none!important;border:1px solid #ccc!important;background:#fff!important}
  .fam-card:hover{border-color:#ccc!important}
  .fam-card-hdr{border-bottom:1px solid #ccc!important}
  .fam-row{border-bottom:1px solid #f0f0f0!important}
  .fam-row-sep{display:none!important}
  .cards-section-hdr{break-inside:avoid;background:#f3e8ff!important;color:#7e22ce!important;border:1px solid #d8b4fe!important;padding:4px 6px!important}
  .page-break{break-after:page!important;display:block!important;grid-column:1/-1;height:0;visibility:hidden}
  :root{--text:#111;--muted:#666;--green:#1a7a3a;--red:#c0392b;--blue:#2563eb;--border:#ddd;--surface:#fff;--surface2:#f5f5f5}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">AD</div>
      <div>
        <div class="hdr-title">SALDO TEÓRICO — NOMURA</div>
        <div class="hdr-sub">Acompanhamento de Famílias · Adidas Brasil</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="view-tabs">
        <button class="view-tab active" id="tabDash" onclick="setView('dash',this)">Dashboard</button>
        <button class="view-tab" id="tabCards" onclick="setView('cards',this)">Cards</button>
        <button class="view-tab" id="tabProj" onclick="setView('proj',this)">Projeção de Ruptura</button>
      </div>
      <button class="agend-btn" onclick="openAgend()">📦 Agendamentos</button>
      <span class="tag tag-live">● AO VIVO</span>
      <span class="tag-date" id="tagDate"></span>
    </div>
  </header>
  <div class="kpi-bar" id="kpiBar"></div>
  <div class="kpi-bar kpi-bar-rs" id="kpiBarRS"></div>
  <div class="state-bar">

const META_RS        = DATA.meta_rs;

const PROJ_RS    = DATA.dia_corte > 0 ? Math.round(REALIZ_RS / DATA.dia_corte * DATA.dias_no_mes) : 0;

var families = DATA.families.map(f => {
  const p = f.proj || [];
  const v0 = p[0] ? p[0].vest : 0;
  const c0 = p[0] ? p[0].cart : 0;
  const ritmo = DATA.dia_corte > 0 ? Math.round((f.real_jul||0) / DATA.dia_corte * DATA.dias_no_mes) : 0;
  return Object.assign({}, f, {
    cart_jul:  c0,
    vest_jul:  v0,
    cart_ago:  p[1] ? p[1].cart : 0,
    vest_ago:  p[1] ? p[1].vest : 0,
    cart_set:  p[2] ? p[2].cart : 0,
    vest_set:  p[2] ? p[2].vest : 0,
    cart_out:  p[3] ? p[3].cart : 0,
    vest_out:  p[3] ? p[3].vest : 0,
    cart_nov:  p[4] ? p[4].cart : 0,
    vest_nov:  p[4] ? p[4].vest : 0,
    est_prop:       DATA.dias_no_mes > 0 ? Math.round(v0 * DATA.dia_corte / DATA.dias_no_mes) : 0,
    ritmo_jul:      ritmo,
    ritmo_jul_real: ritmo,
    saldo_est:   (f.estoque||0) + (f.agend||0) + c0 - v0,
    saldo_ritmo: (f.estoque||0) + (f.agend||0) + c0 - ritmo,
    venda_media: (function(v){var nz=v.filter(function(x){return x>0});return nz.length?Math.round(nz.reduce(function(a,b){return a+b},0)/nz.length):0})(f.vendas),
  });
});
families.forEach(function(f){

});

function getStatus(f){
  if(f.woh===0) return 'semgiro';
  if(f.woh<9)  return 'ruptura';
  if(f.woh>=16) return 'excesso';
  return 'ok';
}
function isEstrela(f){
  var mai=f.vendas[4]; var ritmo=f.est_prop/DATA.dia_corte*31;
  return mai>0&&ritmo>mai*1.1;
}
function healthScore(f){
  var w=f.woh,ws2;
  if(w===0) ws2=5;
  else if(w<9) ws2=10+(w/9)*40;
  else if(w<=16) ws2=100;
  else if(w<=30) ws2=100-((w-16)/14)*40;
  else ws2=Math.max(5,60-((w-30)/140)*55);
  var v=f.vendas,cur=v[4]||v[3]||0,prv=v[3]||v[2]||0;
  var trend=prv>0?(cur-prv)/prv:0;
  return Math.min(100,Math.max(2,Math.round(ws2+Math.min(8,Math.max(-8,trend*20)))));
}
function statusColor(st){return{ok:'#10b981',ruptura:'#ef4444',excesso:'#f97316',semgiro:'#64748b',estrela:'#a855f7'}[st]||'#64748b'}
function statusLabel(st){return{ok:'OK',ruptura:'RUPTURA',excesso:'EXCESSO',semgiro:'SEM GIRO',estrela:'ESTRELA'}[st]||st}
function badgeClass(st){return{ok:'badge-ok',ruptura:'badge-ruptura',excesso:'badge-excesso',semgiro:'badge-semgiro',estrela:'badge-estrela'}[st]||'badge-semgiro'}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1).replace('.',',')+' M';if(n>=1e3)return Math.round(n/1e3)+'k';return String(n)}

var _familiesOrig = families.slice();

function recomputeGlobals(){
  totalEst  = families.reduce(function(a,f){return a+f.estoque},0);
  totalAgend= families.reduce(function(a,f){return a+f.agend},0);
  wohMedia  = families.length ? Math.round(families.reduce(function(a,f){return a+f.woh},0)/families.length) : 0;
  nRuptura  = families.filter(function(f){return f.status==='ruptura'}).length;
  nExcesso  = families.filter(function(f){return f.status==='excesso'}).length;
  nEstrela  = families.filter(function(f){return f.status==='estrela'}).length;
}
recomputeGlobals();

function setStateFilter(state, btn){
  selectedState = state;
  document.querySelectorAll('.state-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  if(state==='all'){
    families = _familiesOrig;
  } else {
    families = _familiesOrig.map(function(f){
      var s=(f.by_state||{})[state]||{};
      var est=s.est||0, agend=s.agd||0, cart=s.cart_jul||0, real=s.real_jul||0;
      var ritmo=DATA.dia_corte>0?Math.round(real/DATA.dia_corte*DATA.dias_no_mes):0;
      var estTot=f.estoque||1;
      var vestFrac=estTot>0?est/estTot:0;
      var vest=Math.round((f.vest_jul||0)*vestFrac);
      var vsSem=DATA.dias_periodo>0?(real/DATA.dias_periodo*7):0;
      if(vsSem===0){
        // sem vendas neste estado ainda: usa taxa total proporcional ao estoque do estado
        var vsSemTot=DATA.dias_periodo>0?((f.real_jul||0)/DATA.dias_periodo*7):0;
        vsSem=estTot>0&&vsSemTot>0?vsSemTot*est/estTot:0;
      }
      var woh=vsSem>0?Math.round(est/vsSem):0;
      var nf=Object.assign({},f,{
        estoque:est, agend:agend, cart_jul:cart, real_jul:real,
        ritmo_jul:ritmo, ritmo_jul_real:ritmo, vest_jul:vest,
        saldo_est:est+agend+cart-vest, saldo_ritmo:est+agend+cart-ritmo, woh:woh,
      });
      nf.score=healthScore(nf);
      nf.status=isEstrela(nf)?'estrela':getStatus(nf);
      return nf;
    });
  }
  recomputeGlobals();
  document.getElementById('stateNote').style.display = state==='all'?'none':'inline';
  renderKPIs(); renderKPIsRS(); renderRanking(); renderAlerts();
  if(selIdx>=0&&families[selIdx]) renderDetail(families[selIdx]);
  if(viewMode==='cards') renderCards();
}

function isFeds(f){return f.name.toUpperCase().indexOf('FEDS')>=0}
function isFtw(f){return (f.div||'FTW')==='FTW'}
function isApp(f){return (f.div||'FTW')==='APP'}
function getSorted(){
  var arr=families.map(function(f,i){return Object.assign({},f,{origIdx:i})});
  if(filtKey==='feds')  arr=arr.filter(isFeds);
  else if(filtKey==='other') arr=arr.filter(function(f){return !isFeds(f)});
  if(divKey==='ftw') arr=arr.filter(isFtw);
  else if(divKey==='app') arr=arr.filter(isApp);
  if(sortKey==='score')        arr.sort(function(a,b){return b.score-a.score});
  else if(sortKey==='estoque') arr.sort(function(a,b){return b.estoque-a.estoque});
  else if(sortKey==='woh_asc') arr.sort(function(a,b){return a.woh-b.woh});
  else if(sortKey==='woh_desc')arr.sort(function(a,b){return b.woh-a.woh});
  return arr;
}

function drawSparkline(canvas,data,color){
  var ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  var nz=data.map(function(v,i){return{v:v,i:i}}).filter(function(x){return x.v>0});
  if(nz.length<2) return;
  var mx=Math.max.apply(null,nz.map(function(x){return x.v}));
  var mn=Math.min.apply(null,nz.map(function(x){return x.v}));
  var rng=mx-mn||1;
  var pts=nz.map(function(x,ni){return{x:ni/(nz.length-1)*(W-4)+2,y:H-2-((x.v-mn)/rng)*(H-4)}});
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(function(p){ctx.lineTo(p.x,p.y)});
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  var last=pts[pts.length-1];
  ctx.beginPath();ctx.arc(last.x,last.y,2,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}

function projTable(f,col){

      +'<div style="font-size:8px;color:var(--muted);margin-top:2px;text-align:right">'+pct+'%</div></td>'

        +'<th style="padding:5px 10px;text-align:left;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Mês</th>'
        +'<th style="padding:5px 10px;text-align:right;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Carteira</th>'
        +'<th style="padding:5px 10px;text-align:right;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Venda Est.</th>'
        +'<th style="padding:5px 10px;text-align:right;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Cobertura</th>'

function projCard(title,vest,cart,col){

function wohInterpret(w){
  if(w===0) return 'Sem giro registrado';
  if(w<9)  return '⚠ Ruptura iminente — reposição urgente';
  if(w<=16) return '✓ Cobertura ideal (2–4 meses)';
  if(w<=30) return 'Excesso leve — acionar sell-out';
  if(w<=60) return 'Excesso crítico — promoção ou outlet';
  return 'Excesso severo — ação imediata necessária';
}
function scaleSegs(woh){
  var zones=[{f:0,t:8,c:'#ef4444'},{f:8,t:16,c:'#10b981'},{f:16,t:30,c:'#f59e0b'},{f:30,t:60,c:'#f97316'},{f:60,t:999,c:'#7c2d12'}];
  var m=Math.min(woh,999);
  return zones.map(function(z){var a=m>=z.f&&m<z.t;return '<div class="woh-seg" style="background:'+z.c+(a?'':'44')+'"></div>'}).join('');
}

function drawWOHGauge(canvas,woh,color){
  if(!canvas) return;
  var ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=W/2-6;
  ctx.clearRect(0,0,W,H);
  var start=Math.PI*0.75,end=Math.PI*2.25,pct=Math.min(woh/80,1);
  ctx.beginPath();ctx.arc(cx,cy,r,start,end);ctx.strokeStyle='#1e3354';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  if(pct>0){ctx.beginPath();ctx.arc(cx,cy,r,start,start+pct*(end-start));ctx.strokeStyle=color;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke()}
  ctx.fillStyle=color;ctx.font='bold 16px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(woh,cx,cy-3);
  ctx.fillStyle='#64748b';ctx.font='8px system-ui';ctx.fillText('sem',cx,cy+10);
}

function drawSalesChart(canvas,f){
  if(!canvas) return;
  var DPR=window.devicePixelRatio||1,W0=canvas.offsetWidth||canvas.width,H0=canvas.height;
  canvas.width=W0*DPR;canvas.height=H0*DPR;
  var ctx=canvas.getContext('2d');ctx.scale(DPR,DPR);
  var W=W0,H=H0,pad={l:36,r:12,t:10,b:24};
  var labels=['Jan','Fev','Mar','Abr','Mai','Jun',DATA.mes_nome.substring(0,3)+'*','Ago*'];
  var hist=f.vendas.slice();
  var estJul=f.vest_jul||f.ritmo_jul;
  var all=hist.concat([estJul,f.vest_ago]);
  var maxV=Math.max.apply(null,all.filter(function(v){return v>0}).concat([1]));
  var n=labels.length,bW=(W-pad.l-pad.r)/n,gap=bW*0.25;
  ctx.clearRect(0,0,W,H);
  [0.25,0.5,0.75,1].forEach(function(p){
    var y=pad.t+(1-p)*(H-pad.t-pad.b);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.strokeStyle='#1e335430';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#64748b';ctx.font='8px system-ui';ctx.textAlign='right';ctx.fillText(fmt(Math.round(p*maxV)),pad.l-3,y+3);
  });
  all.forEach(function(v,i){
    if(!v) return;
    var isP=i>=6,x=pad.l+i*bW+gap/2,bh=(v/maxV)*(H-pad.t-pad.b),y=H-pad.b-bh;
    var barCol=isP?(i===6?statusColor(f.status):'#3b82f6'):'#3b82f6';
    if(isP){ctx.setLineDash([3,2]);ctx.strokeStyle=barCol;ctx.lineWidth=1;ctx.strokeRect(x,y,bW-gap,bh);ctx.setLineDash([]);ctx.fillStyle=barCol+'30'}
    else{ctx.fillStyle='#3b82f6'+(i===5?'aa':'77')}
    ctx.fillRect(x,y,bW-gap,bh);
    ctx.fillStyle='#64748b';ctx.font='8px system-ui';ctx.textAlign='center';ctx.fillText(labels[i],x+(bW-gap)/2,H-pad.b+12);
    if(v>maxV*0.05){ctx.fillStyle='#94a3b8';ctx.font='7px system-ui';ctx.fillText(fmt(v),x+(bW-gap)/2,y-3)}
  });
}

function drawWeekChart(canvas,f){
  if(!canvas) return;
  var DPR=window.devicePixelRatio||1,W0=canvas.offsetWidth||canvas.width,H0=canvas.height;
  canvas.width=W0*DPR;canvas.height=H0*DPR;
  var ctx=canvas.getContext('2d');ctx.scale(DPR,DPR);
  var W=W0,H=H0,pad={l:36,r:12,t:16,b:22};
  var mai=f.vendas[4]||f.venda_media;
  var jun=f.vest_jul||f.ritmo_jul;
  var julP=f.ritmo_jul;
  function wk(m,ws){return[Math.round(m*ws[0]),Math.round(m*ws[1]),Math.round(m*ws[2]),Math.round(m*ws[3])]}
  var w=[0.22,0.26,0.25,0.27];
  var data=wk(mai,w).concat(wk(jun,w)).concat([Math.round(f.est_prop),Math.round(julP/4.33),Math.round(julP/4.33),Math.round(julP/4.33)]);
  var maxV=Math.max.apply(null,data.concat([1]));
  var n=data.length,bW=(W-pad.l-pad.r)/n,gap=bW*0.3;
  ctx.clearRect(0,0,W,H);
  [[0,'#3b82f615'],[4,'#10b98110'],[8,'#f9731610']].forEach(function(gi){
    ctx.fillStyle=gi[1];ctx.fillRect(pad.l+gi[0]*bW,pad.t,4*bW,H-pad.t-pad.b);
  });
  data.forEach(function(v,i){
    var isJ=i>=8,x=pad.l+i*bW+gap/2,bh=(v/maxV)*(H-pad.t-pad.b),y=H-pad.b-bh;
    var col=isJ?statusColor(f.status):(i<4?'#64748b':'#3b82f6');
    if(isJ&&i>8){ctx.setLineDash([3,2]);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y,bW-gap,bh);ctx.setLineDash([]);ctx.fillStyle=col+'22'}
    else{ctx.fillStyle=col+(isJ&&i===8?'cc':'66')}
    ctx.fillRect(x,y,bW-gap,bh);
  });
  [['Maio',2,'#3b82f6'],['Junho',6,'#10b981'],[DATA.mes_nome.substring(0,3),10,statusColor(f.status)]].forEach(function(gl){
    ctx.font='bold 7.5px system-ui';ctx.textAlign='center';ctx.fillStyle=gl[2];
    ctx.fillText(gl[0],pad.l+gl[1]*bW,pad.t-3);
  });
}

var STATUS_COLORS={'AGUARDANDO FATURAMENTO':'#f59e0b','AGUARDANDO EXPEDIÇÃO':'#3b82f6','EM TRÂNSITO - NO PRAZO':'#10b981','EM TRÂNSITO - FORA DO PRAZO':'#ef4444','EXPEDIDO':'#10b981','EXTRAVIO':'#ef4444'};
function statusChipColor(st){return STATUS_COLORS[st]||'#64748b'}

function openAgend(){
  var agends=DATA.agendamentos||[];
  var totalPcs=agends.reduce(function(a,x){return a+x.total},0);
  var fedsAgends=agends.filter(function(x){return x.name.toUpperCase().indexOf('FEDS')>=0});
  var otherAgends=agends.filter(function(x){return x.name.toUpperCase().indexOf('FEDS')<0});
  var totalFeds=fedsAgends.reduce(function(a,x){return a+x.total},0);

  function weekChips(by_week){
    return Object.keys(by_week).sort().map(function(k){
      var wnum=k.replace(/\d{4}-W/,'Sem ');
      return '<span class="week-chip">'+wnum+': '+by_week[k].toLocaleString('pt-BR')+'</span>';
    }).join('');
  }
  function statusChips(by_st){
    return Object.keys(by_st).map(function(st){
      var col=statusChipColor(st);
      var short=st.replace('AGUARDANDO ','AGD. ').replace('EM TRÂNSITO - ','EM TR. ');
      return '<span class="st-chip" style="background:'+col+'22;color:'+col+'">'+short+': '+by_st[st].toLocaleString('pt-BR')+'</span>';
    }).join(' ');
  }
  function table(rows){
    if(!rows.length) return '<p style="color:var(--muted);font-size:11px;padding:8px 0">Nenhum agendamento pendente.</p>';
    return '<table class="agend-table"><thead><tr><th>Família</th><th>Total pcs</th><th>Programação por semana</th><th>Status</th></tr></thead><tbody>'
      +rows.map(function(x){
        return '<tr>'
          +'<td style="font-weight:600">'+x.name+'</td>'
          +'<td style="color:var(--blue);font-weight:700">'+x.total.toLocaleString('pt-BR')+'</td>'
          +'<td>'+weekChips(x.by_week||{})+'</td>'
          +'<td>'+statusChips(x.by_status||{})+'</td>'
        +'</tr>';
      }).join('')+'</tbody></table>';
  }

  document.getElementById('agendBody').innerHTML=
    '<div class="agend-summary">'
      +'<div class="agend-kpi"><div class="kpi-label">Total pendente</div><div class="kpi-val kpi-b">'+totalPcs.toLocaleString('pt-BR')+' pcs</div><div class="kpi-sub">'+agends.length+' famílias com agendamento</div></div>'
      +'<div class="agend-kpi"><div class="kpi-label">Famílias (exceto FEDS)</div><div class="kpi-val kpi-g">'+((totalPcs-totalFeds)||0).toLocaleString('pt-BR')+' pcs</div><div class="kpi-sub">'+otherAgends.length+' famílias</div></div>'
      +'<div class="agend-kpi"><div class="kpi-label">FEDS pendente</div><div class="kpi-val" style="color:var(--purple)">'+totalFeds.toLocaleString('pt-BR')+' pcs</div><div class="kpi-sub">'+fedsAgends.length+' famílias FEDS</div></div>'
    +'</div>'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin-bottom:8px">Famílias Principais</div>'
    +table(otherAgends.sort(function(a,b){return b.total-a.total}))
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#a855f7;margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border)">🌍 FEDS</div>'
    +table(fedsAgends.sort(function(a,b){return b.total-a.total}));

  document.getElementById('agendOverlay').classList.add('open');
}
function closeAgend(){document.getElementById('agendOverlay').classList.remove('open')}
function closeAgendIfBg(e){if(e.target===document.getElementById('agendOverlay'))closeAgend()}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeAgend();closeResumo()}});

var viewMode='dash';
function setView(mode, btn){
  viewMode=mode;
  document.querySelectorAll('.view-tab').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var mainEl=document.querySelector('.main');
  var cardsEl=document.getElementById('cardsView');
  var projEl=document.getElementById('projView');
  var exportBar=document.getElementById('cardsExportBar');
  cardsEl.classList.remove('active');
  projEl.classList.remove('active');
  if(exportBar) exportBar.classList.remove('visible');
  if(mode==='cards'){
    mainEl.style.display='none'; cardsEl.classList.add('active');

    renderCards();
  } else if(mode==='proj'){

var PROJ_MESES=[
  {key:'jul',nome:'Julho',   cart:'cart_jul',vest:'vest_jul'},
  {key:'ago',nome:'Agosto',  cart:'cart_ago',vest:'vest_ago'},
  {key:'set',nome:'Setembro',cart:'cart_set',vest:'vest_set'},
  {key:'out',nome:'Outubro', cart:'cart_out',vest:'vest_out'},
  {key:'nov',nome:'Novembro',cart:'cart_nov',vest:'vest_nov'},
];
var _projSortCol=-1, _projSortDir=1;
function sortProjBy(idx){
  if(_projSortCol===idx){ _projSortDir*=-1; }
  else{ _projSortCol=idx; _projSortDir=1; }
  renderProjecao();
}
function calcProjRows(){
  var rows=_familiesOrig.map(function(f){
    var base=(f.estoque||0)+(f.agend||0);
    var saldos=[],saldo=base;
    PROJ_MESES.forEach(function(m){saldo+=(f[m.cart]||0)-(f[m.vest]||0);saldos.push(saldo);});
    var ruptIdx=-1;
    for(var i=0;i<saldos.length;i++){if(saldos[i]<=0){ruptIdx=i;break;}}
    return {f:f,saldos:saldos,ruptIdx:ruptIdx};
  });
  if(_projSortCol>=0){
    var d=_projSortDir;
    rows.sort(function(a,b){return (a.saldos[_projSortCol]-b.saldos[_projSortCol])*d;});
  } else {
    rows.sort(function(a,b){
      if(a.ruptIdx>=0&&b.ruptIdx>=0) return a.ruptIdx-b.ruptIdx;
      if(a.ruptIdx>=0) return -1;
      if(b.ruptIdx>=0) return 1;
      return a.saldos[4]-b.saldos[4];
    });
  }
  return rows;
}

          +'<span><span class="proj-legend-dot" style="background:#22d3a030"></span>OK</span>'

      +PROJ_MESES.map(function(m,i){

        return '<th class="th-mes" onclick="sortProjBy('+i+')" style="'+style+'">'+m.nome+'<span style="font-size:8px;opacity:'+(isActive?'1':'.4')+'">'+arrow+'</span></th>';

function renderCards(){
  var arr=getSorted();
  var dia=DATA.dia_corte;
  var ftw=arr.filter(function(f){return !isFeds(f)});
  var feds=arr.filter(isFeds);
  function cardHTML(f){
    var col=statusColor(f.status);
    var ritmoReal=f.ritmo_jul_real;
    var vest=f.vest_jul||f.ritmo_jul;
    var saldoEst=f.saldo_est;
    var saldoRitmo=f.saldo_ritmo;
    function row(lbl,val,vc){
      return '<div class="fam-row">'
        +'<span class="fam-row-lbl">'+lbl+'</span>'
        +'<span class="fam-row-val"'+(vc?' style="color:'+vc+'"':'')+'>'+val.toLocaleString('pt-BR')+'</span>'
      +'</div>';
    }
    var wohAlta = f.woh >= 16;
    var propEsp = DATA.dias_no_mes > 0 ? Math.round(vest * DATA.dia_corte / DATA.dias_no_mes) : 0;
    var vendaOk = propEsp > 0 && (f.real_jul || 0) >= propEsp;
    var wohBadge  = wohAlta
      ? '<span class="card-badge-x"  title="WOH muito alta ('+f.woh+' sem)">✕</span>'
      : '<span class="card-badge-ok" title="WOH dentro do normal ('+f.woh+' sem)">✓</span>';
    var vendaBadge = vendaOk
      ? '<span class="card-badge-ok" title="Venda dentro do esperado">✓</span>'
      : '<span class="card-badge-x"  title="Venda abaixo do esperado">✕</span>';
    var badges = wohBadge + vendaBadge;
    var ritmoColor = ritmoReal > vest ? 'var(--red)' : null;
    var saldoEstColor = saldoEst < 0 ? 'var(--red)' : null;
    var saldoRitmoColor = saldoRitmo < 0 ? 'var(--red)' : null;
    return '<div class="fam-card" onclick="setView(\'dash\',document.getElementById(\'tabDash\'));selectByName(\''+f.name.replace(/'/g,"\\'")+'\')">'
      +'<div class="fam-card-hdr">'
        +'<span style="display:flex;align-items:center;gap:4px">'
          +'<span class="fam-card-name" style="color:var(--text)">'+f.name+'</span>'
          +badges
        +'</span>'
        +'<span class="fam-card-woh" style="color:'+col+'">'+f.woh+' sem</span>'
      +'</div>'
      +'<div class="fam-card-body">'
        +row('Estoque do dia', f.estoque)
        +row('Agendamento',    f.agend)
        +row(DATA.mes_nome.substring(0,3)+' realizado até '+dia, f.real_jul||0)
        +row('Ritmo '+DATA.mes_nome.substring(0,3), ritmoReal, ritmoColor)
        +row('Venda est. '+DATA.mes_nome.substring(0,3), vest)
        +'<div class="fam-row-sep"></div>'
        +'<div class="fam-row fam-row-saldo">'
          +'<span class="fam-row-lbl">Saldo c/ est.</span>'
          +'<span class="fam-row-val"'+(saldoEstColor?' style="color:'+saldoEstColor+'"':'')+'>'+saldoEst.toLocaleString('pt-BR')+'</span>'
        +'</div>'
        +'<div class="fam-row fam-row-saldo">'
          +'<span class="fam-row-lbl">Saldo c/ ritmo</span>'
          +'<span class="fam-row-val"'+(saldoRitmoColor?' style="color:'+saldoRitmoColor+'"':'')+'>'+saldoRitmo.toLocaleString('pt-BR')+'</span>'
        +'</div>'
      +'</div>'
    +'</div>';
  }
  var PG = 15; // 5 colunas × 3 linhas
  var parts = [];
  var count = 0;
  ftw.forEach(function(f){
    if(count > 0 && count % PG === 0) parts.push('<div class="page-break"></div>');
    parts.push(cardHTML(f));
    count++;
  });
  if(feds.length){
    parts.push('<div class="cards-section-hdr" style="color:#a855f7">🌍 FEDS — '+feds.length+' famílias</div>');
    feds.forEach(function(f, i){
      if(count > 0 && count % PG === 0) parts.push('<div class="page-break"></div>');
      parts.push(cardHTML(f));
      count++;
    });
  }
  document.getElementById('cardsGrid').innerHTML = parts.join('');
}

    +'<table style="width:100%;border-collapse:collapse;background:var(--surface2);border-radius:6px;overflow:hidden">'
      +'<thead><tr style="border-bottom:1px solid var(--border)">'
        +'<th style="padding:8px 14px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Mês</th>'
        +'<th style="padding:8px 14px;text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Venda Estimada</th>'
        +'<th style="padding:8px 14px;text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Carteira</th>'
        +'<th style="padding:8px 14px;text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Saldo Final</th>'
      +'</tr></thead><tbody>'
        +function(){
          var base = (f.estoque||0) + (f.agend||0);
          var s1 = base + (f.cart_jul||0) - (f.vest_jul||ritmo);
          var s2 = s1   + (f.cart_ago||0) - (f.vest_ago||0);
          var s3 = s2   + (f.cart_set||0) - (f.vest_set||0);
          var s4 = s3   + (f.cart_out||0) - (f.vest_out||0);
          var s5 = s4   + (f.cart_nov||0) - (f.vest_nov||0);
          return projRow(DATA.mes_nome+' '+DATA.ano, f.vest_jul||ritmo, f.cart_jul||0, col, s1)
            +projRow('Agosto '+DATA.ano,    f.vest_ago||0, f.cart_ago||0, '#5b9cf6', s2)
            +projRow('Setembro '+DATA.ano,  f.vest_set||0, f.cart_set||0, '#5b9cf6', s3)
            +projRow('Outubro '+DATA.ano,   f.vest_out||0, f.cart_out||0, '#5b9cf6', s4)
            +projRow('Novembro '+DATA.ano,  f.vest_nov||0, f.cart_nov||0, '#5b9cf6', s5);
        }()
      +'</tbody>'
    +'</table>';
  requestAnimationFrame(function(){
    var c=document.getElementById('resumoChart');
    if(c) drawSalesChart(c,f);
  });
}

renderKPIs();
renderKPIsRS();
renderRanking();
renderAlerts();
selectFamily(getSorted()[0].origIdx);
</script>
